<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farida Mohamed</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd9ec,#ffffff,#eee1ff);
padding:20px;
overflow:auto;
}

.card{
width:100%;
max-width:700px;
background:white;
padding:45px;
border-radius:35px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
text-align:center;
animation:fade 0.8s ease;
}

h1{
font-size:42px;
color:#d63384;
margin-bottom:20px;
}

.text{
font-size:22px;
line-height:2;
color:#444;
margin-bottom:30px;
}

button{
background:#111;
color:white;
border:none;
padding:15px 30px;
border-radius:18px;
font-size:18px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

.section{
display:none;
animation:fade 0.8s ease;
}

input{
width:100%;
padding:15px;
border-radius:18px;
border:1px solid #ddd;
font-size:17px;
margin-top:15px;
outline:none;
text-align:center;
}

input:focus{
border-color:#d63384;
}

.error{
margin-top:15px;
color:#d63384;
font-size:18px;
display:none;
}

.certificate-img{
width:100%;
margin-top:25px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.small{
margin-top:20px;
font-size:18px;
color:#666;
line-height:2;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<!-- البداية -->

<div id="start">

<h1> فريدة 😂💖</h1>

<p class="text">

بما إن دي آخر أيام الجامعة...  
فهسألك سؤال مهم جدًا 😭

</p>

<button onclick="showQ1()">
ابدأ 💀
</button>

</div>


<!-- السؤال -->

<div class="section" id="q1">

<p class="text">
مين أكتر حد هيوحشك بعد التخرج؟ 👀
</p>

<input id="answer" type="text" placeholder=" اكتبي الاسم كامل بالعربي😂">

<div class="error" id="errorText">
والله! 🤨
</div>

<br><br>

<button onclick="checkAnswer()">
التالي ✨
</button>

</div>


<!-- الشهادة -->

<div class="section" id="final">

<p class="text">

كنت عارفة طبعًا 😂💖

</p>

<!-- صورة الشهادة -->

<img 
class="certificate-img"
src="Farida Salah (1).png"
alt="certificate"
>
<br>
<br>

<a href="Farida Salah (1).png" download>
<button>
تحميل الشهادة 🎓
</button>
</a>




</div>

</div>

<script>

function showQ1(){

document.getElementById("start").style.display="none";
document.getElementById("q1").style.display="block";

}

function checkAnswer(){

let answer =
document.getElementById("answer")
.value
.trim()
.toLowerCase();

if(answer === "منه رمضان"){

document.getElementById("q1").style.display="none";
document.getElementById("final").style.display="block";

}

else{

document.getElementById("errorText").style.display="block";

}

}

</script>

</body>

</html>
